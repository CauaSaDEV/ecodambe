<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ecodambe</title>
    <link rel="stylesheet" href="style.css" type="text/css">
</head>

<body>
    <header>
        <a class="logo">
            <img src="./img/logo ecodambe.png" alt="Logo" >
        </a>

        <nav class = "nav">
            <a href="#">Home</a>
            <a href="#reserva">Reservas</a>
            <a href="#">Day Use</a>
            <a href="#">Hospedagem</a>
            <a href="#">Localização</a>
            <a href="#">Sobre Nós</a>
        </nav>

        
    </header>
    <section class="middle">
    <h1>Bem-vindo ao eco dambe!</h1>
    <p>Descubra a beleza natural e a tranquilidade do nosso refúgio ecológico.</p>
    <br>
    <a class="btn-reserva">
     reserve aqui!
    </a>

    </section>
    <div class="scroll-down">
    ↓
    </div>

    <section class="beneficios">

    <div class="card">
        <h3>Natureza</h3>
        <span>Contato total com a natureza.</span>
    </div>

    <div class="card">
        <h3>Hospedagem</h3>
        <span>Conforto e tranquilidade.</span>
    </div>

    <div class="card">
        <h3>Piscina</h3>
        <span>Área de lazer completa.</span>
    </div>  <br><br>

    </section>
<script>

const cards = document.querySelectorAll('.card');

function mostrarCards(){

    cards.forEach((card) => {

        const topo = card.getBoundingClientRect().top;

        const alturaTela = window.innerHeight;

        if(topo < alturaTela - 100){

            card.classList.add('visible');

        }

    });

}

window.addEventListener('scroll', mostrarCards);

mostrarCards();

</script>   
</body>
</html>
